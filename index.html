<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Lucro com Imposto</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.calculator{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
    width:360px;
}

h2{
    text-align:center;
    margin-bottom:10px;
}

.equation{
    font-size:13px;
    text-align:center;
    margin-bottom:20px;
    color:#666;
}

label{
    font-weight:bold;
    font-size:14px;
}

input{
    width:100%;
    padding:9px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1a68d1;
}

.result{
    margin-top:18px;
    padding:12px;
    background:#eef3ff;
    border-radius:8px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.footer{
    margin-top:12px;
    font-size:11px;
    text-align:center;
    color:#777;
}
</style>
</head>

<body>

<div class="calculator">

<h2>Calculadora de Lucro (%)</h2>

<div class="equation">
Equação:<br>
V = (P - C - ((T + I) × P) - F) ÷ P
</div>

<label>Preço do produto (P)</label>
<input type="number" id="p" step="0.01" placeholder="Ex: 122.22">

<label>Custo do produto (C)</label>
<input type="number" id="c" step="0.01" placeholder="Ex: 57">

<label>Taxa do marketplace % (T)</label>
<input type="number" id="t" step="0.01" placeholder="Ex: 12">

<label>Imposto % (I)</label>
<input type="number" id="i" step="0.01" placeholder="Ex: 5">

<label>Frete (F)</label>
<input type="number" id="f" step="0.01" placeholder="Ex: 20">

<button onclick="calcularLucro()">Calcular</button>

<div class="result" id="resultado">Lucro (V): --</div>

<div class="footer">
Informe T e I em porcentagem
</div>

</div>

<script>

function calcularLucro(){

    let p = parseFloat(document.getElementById('p').value);
    let c = parseFloat(document.getElementById('c').value);
    let t = parseFloat(document.getElementById('t').value);
    let i = parseFloat(document.getElementById('i').value);
    let f = parseFloat(document.getElementById('f').value);

    if(isNaN(p) || isNaN(c) || isNaN(t) || isNaN(i) || isNaN(f)){
        alert("Preencha todos os campos");
        return;
    }

    // converter porcentagem para decimal
    let tDecimal = t / 100;
    let iDecimal = i / 100;

    let v = (p - c - ((tDecimal + iDecimal) * p) - f) / p;

    let percentual = (v * 100).toFixed(2);

    document.getElementById('resultado').innerHTML =
        "Lucro (V): " + percentual + "%";
}

</script>

</body>
</html>
